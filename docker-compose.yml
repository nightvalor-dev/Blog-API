services:
  postgres:
    image: postgres:17
    container_name: wilproject2
    env_file:
      - .env
    ports:
      - "5463:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: wilproject2_redis
    env_file:
      - .env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: